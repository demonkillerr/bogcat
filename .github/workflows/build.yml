name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  install-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Cache workspace dependencies
        uses: actions/upload-artifact@v4
        with:
          name: workspace-node-modules
          path: node_modules
          if-no-files-found: error

  test-prisma-schema-generation:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore workspace dependencies
        uses: actions/download-artifact@v4
        with:
          name: workspace-node-modules
          path: node_modules

      - name: Generate Prisma client
        run: npm run db:generate

  build-backend-api:
    runs-on: ubuntu-latest
    needs: test-prisma-schema-generation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore workspace dependencies
        uses: actions/download-artifact@v4
        with:
          name: workspace-node-modules
          path: node_modules

      - name: Build Backend (API)
        run: npm run build -- --filter=@bogcat/api

  build-frontend-web:
    runs-on: ubuntu-latest
    needs: test-prisma-schema-generation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore workspace dependencies
        uses: actions/download-artifact@v4
        with:
          name: workspace-node-modules
          path: node_modules

      - name: Build Frontend (Web)
        run: npm run build -- --filter=@bogcat/web
